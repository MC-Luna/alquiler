<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="">
  <meta name="author" content="">
  <title>MotoTrabajo</title>
  <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
  <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet">
  <link href="css/sb-admin-2.min.css" rel="stylesheet">
</head>

<script src="vendor/jquery/jquery.min.js"></script>
<script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="vendor/jquery-easing/jquery.easing.min.js"></script>
<script src="js/sb-admin-2.min.js"></script>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js" type="text/javascript"></script>

<script src="js/jquery.growl.js" type="text/javascript"></script>
<link href="css/jquery.growl.css" rel="stylesheet" type="text/css" />

<script type="text/javascript">

  $(document).ready(function(){
    $("#btn_login").bind("click",iniciar_sesion);
  });

  function iniciar_sesion(){
    if($("#InputEmail").val()=="" || $("#InputPassword").val()==""){
      $.growl.error({ message: "Debe ingresar el usuario y la contraseña!" });
      
      if ($("#InputEmail").val()=="") {
        $("#InputEmail").focus();
        return false;
      }

      if ($("#InputPassword").val()=="") {
        $("#InputPassword").focus();
        return false;
      }
      
    }else{
      $.ajax({
        type: 'POST',
        async: false,
        url: 'ajax/login.php',
        data: {
          email: $("#InputEmail").val(),
          pass: $("#InputPassword").val() 
        },
        success: function(data){
          console.log(data);
          if (data.resultado==0) {
            $.growl.error({ message:data.mensaje });
          }else{
            location.href="index.php";
          }  
        },
        dataType: 'json'
      });

    }
  }

</script>

<body class="bg-gradient-primary">

  <div class="container">

    <!-- Outer Row -->
    <div class="row justify-content-center">

      <div class="col-xl-6 col-lg-12 col-md-9">

        <div class="card o-hidden border-0 shadow-lg my-5">
          <div class="card-body p-0">
            <!-- Nested Row within Card Body -->
            <div class="row">
              
              <div class="col-lg-12">
                <div class="p-5">
                  <div class="text-center">
                    <img id="logos" src="img/motoapp_logo_light.png" style="width: 100%;">
                    <h1 class="h4 text-gray-900 " style="margin-bottom: 0.5rem!important;">Bienvenido</h1>
                    <p>Ingresa y gestiona la renta de motos para trabajar o turismo de MotoApp</p>
                  </div>
                  <form class="user" id="form_login" name="form_login">
                    <div class="form-group">
                      <input type="email" class="form-control form-control-user" id="InputEmail" aria-describedby="emailHelp" placeholder="Correo">
                    </div>
                    <div class="form-group">
                      <input type="password" class="form-control form-control-user" id="InputPassword" placeholder="Contraseña">
                    </div>
                   
                    <a href="#" id="btn_login" class="btn btn-primary btn-user btn-block">
                      Iniciar sesión
                    </a>
                    <hr>
                  </form>

                  <div class="text-center">
                    <a class="small" href="forgot-password.html">Olvidé mi contraseña?</a>
                  </div>
                  <hr>
                  <div class="text-center">
                    <label class="small" for="">Versión 1.7</label>
                  </div>

                </div>
        
            </div>
          </div>
        </div>

      </div>

    </div>

  </div>

</body>

</html>
